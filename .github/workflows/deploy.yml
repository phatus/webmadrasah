name: Deploy to Live Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: "--no-deprecation"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ensure Cache Folders Exist
        run: |
          mkdir -p .next/cache
          mkdir -p node_modules

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Identify Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            package:
              - 'package-lock.json'
            prisma:
              - 'prisma/schema.prisma'
            src:
              - 'src/**'
              - 'public/**'
              - 'next.config.ts'
              - 'next.config.js'
              - 'package.json'
              - 'postcss.config.js'
              - '.github/workflows/deploy.yml'

      # Cache node_modules on self-hosted runner (biggest speedup)
      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Copy .env from production
        run: |
          if [ -f "/www/wwwroot/webmadrasah/.env" ]; then
            cp /www/wwwroot/webmadrasah/.env .
          fi

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      # Cache .next/cache for faster rebuilds
      - name: Cache Next.js Build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Generate Prisma Client
        if: steps.npm-cache.outputs.cache-hit != 'true' || steps.filter.outputs.prisma == 'true'
        run: npx prisma generate

      - name: Backup Database
        if: steps.filter.outputs.prisma == 'true'
        run: |
          echo "Creating database backup..."

          # Check if pg_dump is available
          if ! command -v pg_dump &> /dev/null; then
            echo "⚠️  pg_dump not found. Skipping backup."
            echo "   Install PostgreSQL client: 'sudo apt-get install postgresql-client'"
            exit 0
          fi

          # Load env variables from .env
          if [ -f .env ]; then
            export $(grep -v '^#' .env | xargs)
          fi
          
          # Use DIRECT_URL for pg_dump if available, otherwise DATABASE_URL
          DB_URL="${DIRECT_URL:-$DATABASE_URL}"
          
          if [ -z "$DB_URL" ]; then
            echo "⚠️  Database URL not found in .env. Skipping backup."
            # Don't fail the deployment just because backup failed
          else
            # Use a location inside the app directory that's already writable
            BACKUP_DIR=".backup/db"
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/backup-$(date +%Y%m%d-%H%M%S).sql"

            echo "📦 Creating backup at $BACKUP_FILE..."
            if pg_dump --no-owner --no-acl "$DB_URL" > "$BACKUP_FILE" 2>&1; then
              echo "✅ Backup created: $(ls -lh "$BACKUP_FILE")"

              # Also copy to /www/backup if it exists and is writable (optional)
              if [ -w "/www/backup" ]; then
                sudo mkdir -p "/www/backup/webmadrasah/db" 2>/dev/null || true
                if [ -d "/www/backup/webmadrasah/db" ]; then
                  sudo cp "$BACKUP_FILE" "/www/backup/webmadrasah/db/"
                  echo "✅ Backup also saved to /www/backup/webmadrasah/db/"
                fi
              fi

              # Keep only last 7 backups in app directory
              ls -t "$BACKUP_DIR"/backup-*.sql 2>/dev/null | tail -n +8 | xargs -r rm
              echo "✅ Old backups cleaned (keeping last 7 in $BACKUP_DIR)"
            else
              echo "❌ pg_dump failed. Check DATABASE_URL and connectivity."
              rm -f "$BACKUP_FILE"
              # Don't fail deployment, just continue
            fi
          fi

      - name: Run Database Migrations
        if: steps.filter.outputs.prisma == 'true'
        run: |
          if [ -f .env ]; then
            export $(grep -v '^#' .env | xargs)
            npx prisma migrate deploy
          else
            echo "⚠️  .env file not found. Skipping migrations."
          fi

      - name: Build Application
        if: steps.filter.outputs.src == 'true'
        run: npm run build

      - name: Deploy to Production
        if: steps.filter.outputs.src == 'true'
        run: |
          # Sync prisma schema (critical for database provider)
          sudo /usr/bin/rsync -rltz --inplace --chown=www:www prisma/ /www/wwwroot/webmadrasah/prisma/

          # Sync standalone (quiet, fast)
          sudo /usr/bin/rsync -rltz --inplace --chown=www:www .next/standalone/ /www/wwwroot/webmadrasah/

          # Sync static assets (Into root and into .next/static)
          sudo /usr/bin/mkdir -p /www/wwwroot/webmadrasah/.next/static
          sudo /usr/bin/rsync -rltz --inplace --delete --chown=www:www .next/static/ /www/wwwroot/webmadrasah/.next/static/
          
          # Also ensure .next/standalone/.next/static exists if server.js looks there
          sudo /usr/bin/mkdir -p /www/wwwroot/webmadrasah/.next/standalone/.next/static
          sudo /usr/bin/rsync -rltz --inplace --delete --chown=www:www .next/static/ /www/wwwroot/webmadrasah/.next/standalone/.next/static/

          # Sync public (exclude uploads)
          sudo /usr/bin/rsync -rltz --inplace --delete --exclude 'uploads' --chown=www:www public/ /www/wwwroot/webmadrasah/public/

      - name: Restart Application
        if: steps.filter.outputs.src == 'true'
        run: |
          cd /www/wwwroot/webmadrasah
          NODE_ENV=production NODE_OPTIONS="--no-deprecation" pm2 restart webmadrasah || NODE_ENV=production NODE_OPTIONS="--no-deprecation" pm2 start server.js --name "webmadrasah" --node-args="--no-deprecation"
