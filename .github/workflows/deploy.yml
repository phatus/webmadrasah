name: Deploy to Production Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Install dependencies
      run: npm ci

    - name: 🔨 Generate Prisma Client
      run: npx prisma generate

    - name: 🏗️ Build application
      run: npm run build

    - name: 🚀 Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          cd /www/wwwroot/webmadrasah || exit 1
          if [ -d .git ]; then git pull origin main; else echo "No .git"; fi
          npm ci --only=production
          if [ ! -f .env ]; then
            cat > .env << ENVEOF
DATABASE_URL=${ secrets.DATABASE_URL }
AUTH_SECRET=${ secrets.AUTH_SECRET }
NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }
CLOUDINARY_API_KEY=${ secrets.CLOUDINARY_API_KEY }
CLOUDINARY_API_SECRET=${ secrets.CLOUDINARY_API_SECRET }
NODE_ENV=production
PORT=3001
ENVEOF
          fi
          if command -v pm2 &> /dev/null; then
            pm2 restart webmadrasah || pm2 start "npm start" --name webmadrasah
            pm2 save
          else
            npm install -g pm2
            pm2 start "npm start" --name webmadrasah
            pm2 save
          fi
          echo "✅ Deployed!"

    - name: ✅ Done
      run: echo "Deployment complete! Check https://mtsn1pacitan.sch.id"
