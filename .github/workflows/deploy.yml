name: Deploy to Live Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Identify Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            package:
              - 'package-lock.json'
            prisma:
              - 'prisma/schema.prisma'
            src:
              - 'src/**'
              - 'public/**'
              - 'next.config.ts'
              - 'next.config.js'
              - 'package.json'
              - '.github/workflows/deploy.yml'

      # Cache node_modules on self-hosted runner (biggest speedup)
      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Copy .env from production
        run: |
          if [ -f "/www/wwwroot/webmadrasah/.env" ]; then
            cp /www/wwwroot/webmadrasah/.env .
          fi

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      # Cache .next/cache for faster rebuilds
      - name: Cache Next.js Build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Generate Prisma Client
        if: steps.npm-cache.outputs.cache-hit != 'true' || steps.filter.outputs.prisma == 'true'
        run: npx prisma generate

      - name: Backup Database
        if: steps.filter.outputs.prisma == 'true'
        run: |
          echo "Creating database backup..."
          BACKUP_DIR="/www/backup/webmadrasah/db"
          mkdir -p "$BACKUP_DIR"
          BACKUP_FILE="$BACKUP_DIR/backup-$(date +%Y%m%d-%H%M%S).sql"

          # Try pg_dump if available
          if command -v pg_dump &> /dev/null; then
            echo "Using pg_dump to create backup at $BACKUP_FILE"
            pg_dump --no-owner --no-acl $DATABASE_URL > "$BACKUP_FILE"
            echo "✅ Backup created: $(ls -lh "$BACKUP_FILE")"
          else
            echo "⚠️  pg_dump not found. Skipping backup."
            echo "   Install PostgreSQL client tools for automated backups."
          fi

          # Keep only last 7 backups
          cd "$BACKUP_DIR"
          ls -t backup-*.sql 2>/dev/null | tail -n +8 | xargs -r rm
          echo "✅ Backup cleanup complete (keeping last 7 backups)"

      - name: Run Database Migrations
        if: steps.filter.outputs.prisma == 'true'
        run: npx prisma migrate deploy

      - name: Build Application
        if: steps.filter.outputs.src == 'true'
        run: npm run build

      - name: Deploy to Production
        if: steps.filter.outputs.src == 'true'
        run: |
          # Sync standalone (quiet, fast)
          sudo /usr/bin/rsync -rltz --inplace --chown=www:www .next/standalone/ /www/wwwroot/webmadrasah/
          
          # Sync static assets
          sudo /usr/bin/mkdir -p /www/wwwroot/webmadrasah/.next/static
          sudo /usr/bin/rsync -rltz --inplace --delete --chown=www:www .next/static/ /www/wwwroot/webmadrasah/.next/static/
          
          # Sync public (exclude uploads)
          sudo /usr/bin/rsync -rltz --inplace --delete --exclude 'uploads' --chown=www:www public/ /www/wwwroot/webmadrasah/public/

      - name: Restart Application
        if: steps.filter.outputs.src == 'true'
        run: |
          cd /www/wwwroot/webmadrasah
          pm2 restart webmadrasah || pm2 start server.js --name "webmadrasah"
