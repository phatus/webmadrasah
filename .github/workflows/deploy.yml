name: Deploy to Live Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Identify Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            package:
              - 'package-lock.json'
            prisma:
              - 'prisma/schema.prisma'
            src:
              - 'src/**'
              - 'public/**'
              - 'next.config.ts'
              - 'next.config.js'
              - 'package.json'
              - '.github/workflows/deploy.yml'

      # Cache node_modules on self-hosted runner (biggest speedup)
      - name: Cache node_modules
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci

      # Cache .next/cache for faster rebuilds
      - name: Cache Next.js Build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Copy .env from production
        run: |
          if [ -f "/www/wwwroot/webmadrasah/.env" ]; then
            cp /www/wwwroot/webmadrasah/.env .
          fi

      - name: Generate Prisma Client
        if: steps.npm-cache.outputs.cache-hit != 'true' || steps.filter.outputs.prisma == 'true'
        run: npx prisma generate

      - name: Push Database Changes
        if: steps.filter.outputs.prisma == 'true'
        run: npx prisma db push --accept-data-loss

      - name: Build Application
        if: steps.filter.outputs.src == 'true'
        run: npm run build

      - name: Deploy to Production
        if: steps.filter.outputs.src == 'true'
        run: |
          # Sync standalone (quiet, fast)
          sudo /usr/bin/rsync -rltz --inplace --chown=www:www .next/standalone/ /www/wwwroot/webmadrasah/
          
          # Sync static assets
          sudo /usr/bin/mkdir -p /www/wwwroot/webmadrasah/.next/static
          sudo /usr/bin/rsync -rltz --inplace --delete --chown=www:www .next/static/ /www/wwwroot/webmadrasah/.next/static/
          
          # Sync public (exclude uploads)
          sudo /usr/bin/rsync -rltz --inplace --delete --exclude 'uploads' --chown=www:www public/ /www/wwwroot/webmadrasah/public/

      - name: Restart Application
        if: steps.filter.outputs.src == 'true'
        run: |
          cd /www/wwwroot/webmadrasah
          pm2 restart webmadrasah || pm2 start server.js --name "webmadrasah"
